name: Build Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x gradlew

      - run: ./gradlew shadowJar --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: skyblock-build
          path: |
            **/build/libs/**
